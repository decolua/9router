name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - name: Run tests
        run: npm test 2>&1 | tee test-output.txt
      - name: Upload test output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-node-${{ matrix.node-version }}
          path: test-output.txt

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Run ESLint
        run: npx eslint . 2>&1 | tee lint-output.txt
      - name: Upload lint output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-output
          path: lint-output.txt
