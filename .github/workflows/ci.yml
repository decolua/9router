name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read
  pull-requests: write

jobs:
  notify-start:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      comment-id: ${{ steps.comment.outputs.comment-id }}
    steps:
      - name: Add reaction to PR
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              content: 'eyes'
            });

      - name: Post running comment
        id: comment
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comment } = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '⏳ Running checks...'
            });
            core.setOutput('comment-id', comment.id);

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - name: Run tests
        id: test
        run: npm test 2>&1 | tee test-output.txt
      - name: Upload test output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-node-${{ matrix.node-version }}
          path: test-output.txt

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Run ESLint
        id: lint
        run: |
          npx eslint . --format json -o lint-output.json || true
          npx eslint . 2>&1 | tee lint-output.txt
      - name: Upload lint output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-output
          path: |
            lint-output.txt
            lint-output.json

  report:
    if: github.event_name == 'pull_request' && always()
    needs: [notify-start, test, build, lint]
    runs-on: ubuntu-latest
    steps:
      - name: Post results comment
        uses: actions/github-script@v7
        with:
          script: |
            const testNode20 = '${{ needs.test.result }}';
            const build = '${{ needs.build.result }}';
            const lint = '${{ needs.lint.result }}';
            const commentId = '${{ needs.notify-start.outputs.comment-id }}';

            // Delete the "running" comment
            if (commentId) {
              try {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: commentId
                });
              } catch (e) {
                // comment may already be deleted
              }
            }

            const icon = (result) => result === 'success' ? '✅' : '❌';
            const allPassed = testNode20 === 'success' && build === 'success' && lint === 'success';

            let body = '';
            if (allPassed) {
              body = '✅ **All checks passed**\n\n';
              body += `| Check | Status |\n|---|---|\n`;
              body += `| Tests (Node 20 & 22) | ${icon(testNode20)} |\n`;
              body += `| Build | ${icon(build)} |\n`;
              body += `| Lint | ${icon(lint)} |\n`;
            } else {
              body = '❌ **Some checks failed**\n\n';
              body += `| Check | Status |\n|---|---|\n`;
              body += `| Tests (Node 20 & 22) | ${icon(testNode20)} |\n`;
              body += `| Build | ${icon(build)} |\n`;
              body += `| Lint | ${icon(lint)} |\n`;
              body += '\n---\n\n';

              if (testNode20 !== 'success') {
                body += '### Test failures\n';
                body += 'See the [test artifacts](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ') for details.\n\n';
              }
              if (build !== 'success') {
                body += '### Build failed\n';
                body += 'See the [build log](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ') for details.\n\n';
              }
              if (lint !== 'success') {
                body += '### Lint issues\n';
                body += 'See the [lint artifacts](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ') for details.\n\n';
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
