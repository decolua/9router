name: CI Report

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  pull-requests: write

jobs:
  comment:
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const pr = run.pull_requests[0];
            if (!pr) return;

            const { data: jobs } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run.id
            });

            // Delete previous CI report
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number
            });
            for (const c of comments.data || comments) {
              if (c.user?.type === 'Bot' && c.body?.startsWith('### CI')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id
                }).catch(() => {});
              }
            }

            // Build results
            const get = (name) => jobs.jobs.find(j => j.name === name)?.conclusion || 'unknown';
            const s = (r) => r === 'success' ? '✅' : '❌';
            const passed = run.conclusion === 'success';

            let body = passed
              ? `### CI ✅ All checks passed\n`
              : `### CI ❌ Some checks failed\n`;

            body += `| Check | Result |\n|---|---|\n`;
            body += `| Tests (Node 20) | ${s(get('test (20)'))} |\n`;
            body += `| Tests (Node 22) | ${s(get('test (22)'))} |\n`;
            body += `| Build | ${s(get('build'))} |\n`;
            body += `| Lint | ${s(get('lint'))} |\n`;
            body += `\n[Details](${run.html_url})`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body
            });
